name: Deploy to Firebase Hosting
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  id-token: write
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: gen-lang-client-0722799198
          workload_identity_provider: projects/463824382309/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: firebase-deploy@gen-lang-client-0722799198.iam.gserviceaccount.com
      - name: Deploy to Firebase
        run: npx -y firebase-tools@latest deploy --only hosting --project gen-lang-client-0722799198 --non-interactive
